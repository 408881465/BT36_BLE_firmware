name: Build DA14535 Firmware with CMake + GCC

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM GCC toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi make cmake

      - name: Configure CMake
        run: |
          cd project
          mkdir -p build
          cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=../gcc/arm-none-eabi.cmake -DGCC_TOOLCHAIN_PATH=/usr -DDIALOG_SDK_PATH=$GITHUB_WORKSPACE/SDK/DA14535_SDK/DA145xx_SDK/6.0.24.1464 ..

      - name: Build firmware
        run: |
          cd project/build
          cmake --build . -j$(nproc)

      - name: Display build output
        if: always()
        run: |
          cd project/build
          ls -la *.hex *.bin 2>/dev/null || echo "Checking build output..."
          cat DA14535_BLE.map 2>/dev/null | tail -20 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: |
            project/build/*.hex
            project/build/*.bin
            project/build/*.map
            project/build/DA14535_BLE.elf
          retention-days: 30
